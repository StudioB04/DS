name: Deploy storybook

on:
  workflow_dispatch:
  repository_dispatch:
    types: [storybook]

# Permissions minimales pour GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Évite les conflits si tu lances plusieurs builds à la suite
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Ou ta version spécifique
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
